name: Build Simple Schedules Transcribe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install ffmpeg (Windows)
      run: choco install ffmpeg

    - name: Build with PyInstaller
      run: pyinstaller build.spec

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Simple-Schedules-Transcribe-Windows
        path: "dist/Simple Schedules Transcribe"

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3-gi gir1.2-webkit2-4.1 gir1.2-gtk-3.0 libgirepository1.0-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller build.spec

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Simple-Schedules-Transcribe-Linux
        path: "dist/Simple Schedules Transcribe"

  build-macos-arm64:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        # Install ffmpeg on macOS as it is required
        brew install ffmpeg
        # Fix for PyInstaller error: "The 'typing' package is an obsolete backport..."
        pip uninstall -y typing || true

    - name: Build with PyInstaller
      run: pyinstaller build.spec

    - name: Upload macOS ARM64 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Simple-Schedules-Transcribe-macOS-AppleSilicon
        path: "dist/Simple Schedules Transcribe.app"

  build-macos-intel:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        # Install ffmpeg on macOS as it is required
        brew install ffmpeg
        # Fix for PyInstaller error: "The 'typing' package is an obsolete backport..."
        pip uninstall -y typing || true

    - name: Build with PyInstaller
      run: pyinstaller build.spec

    - name: Upload macOS Intel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Simple-Schedules-Transcribe-macOS-Intel
        path: "dist/Simple Schedules Transcribe.app"
